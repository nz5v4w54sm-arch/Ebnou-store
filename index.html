<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:image" content="whatsapp-banner.png">
    <meta property="og:title" content="Ebnou-Store | Sénégal">
    <meta property="og:url" content="https://ebnou-store.vercel.app/">
    <meta property="og:description" content="Bienvenue chez Ebnou Store - Votre boutique préférée au Sénégal">
    <title id="pageTitle">Ebnou-Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="my-logo1.png">
    <link rel="apple-touch-icon" href="my-logo.png">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    
    <div class="top-bar">
        <select id="langSelect">
            <option value="ar">العربية (AR)</option>
            <option value="en">English (EN)</option>
            <option value="fr" selected>Français (FR)</option>
        </select>
        <select id="currencySelect">
            <option value="XOF">FCFA (CFA)</option>
            <option value="MRU">MRU (UM)</option>
        </select>
    </div>

    <div id="authSection" class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <button id="loginTab" class="active">تسجيل الدخول</button>
                <button id="signupTab">إنشاء حساب</button>
            </div>
            <form id="authForm" style="display: flex; flex-direction: column; gap: 15px;">
                <div class="input-group">
                    <label id="emailLabel">البريد الإلكتروني</label>
                    <input type="email" id="authEmail" required style="font-size: 16px;">
                </div>
                <div class="input-group">
                    <label id="passwordLabel">كلمة المرور</label>
                    <input type="password" id="authPassword" required style="font-size: 16px;">
                </div>
                <div class="input-group" id="confirmPasswordGroup" style="display: none;">
                    <label id="confirmPasswordLabel">تأكيد كلمة المرور</label>
                    <input type="password" id="authConfirmPassword" style="font-size: 16px;">
                </div>
                <button type="submit" class="main-btn" id="mainBtn">Se Connecter</button>
            </form>
            <button id="forgotPasswordBtn" style="background: none; border: none; color: #2563eb; margin-top: 15px; cursor: pointer; text-decoration: underline; width: 100%;">نسيت كلمة المرور؟</button>
        </div>
    </div>

    <div id="storeSection" style="display: none;">
        <div style="display: flex; justify-content: flex-end; padding: 10px;">
            <button id="logoutBtn" style="background-color: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; display: none;">
                Déconnexion 🚪
            </button>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="ابحث عن منتج ...">
        </div>
        <h2 id="productsTitle" class="section-title">المنتجات المتاحة</h2>
        <div class="products-grid"></div>
    </div>

    <div id="imageOverlay" class="image-overlay" onclick="this.style.display='none'">
        <img id="fullImage" src="" alt="Zoom">
    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
