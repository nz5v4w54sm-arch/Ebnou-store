<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ebnou-Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="my-logo.png">
</head>
<body>
    
    <div class="top-bar">
        <select id="currencySelect">
            <option value="XOF">FCFA (CFA)</option>
            <option value="MRU">MRU (MRU)</option>
        </select>
        <button onclick="handleSignOut()" style="background: #ff4d4d; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;">
            Déconnexion
        </button>
    </div>

    <div id="authSection" class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <button id="loginTab" class="active" onclick="switchAuth('login')">Connexion</button>
                <button id="signupTab" onclick="switchAuth('signup')">Inscription</button>
            </div>

            <form id="authForm">
                <div class="input-group" id="nameGroup" style="display: none;">
                    <input type="text" id="authName" placeholder="Nom Complet">
                </div>
                <div class="input-group">
                    <input type="email" id="authEmail" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="authPassword" placeholder="Mot de passe" required>
                </div>
                <div class="input-group" id="confirmPasswordGroup" style="display: none;">
                    <input type="password" id="authConfirmPassword" placeholder="Confirmer mot de passe">
                </div>
                <button type="submit" class="buy-btn" id="mainBtn" style="width: 100% !important;">Se Connecter</button>
            </form>
        </div>
    </div>

    <div id="storeSection" style="display: none;">
        <div class="products-grid"></div>
    </div>

    <div id="imageOverlay" class="image-overlay" onclick="this.style.display='none'">
        <img id="fullImage" src="">
    </div>

    <div id="paymentModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closePayment()">&times;</span>
        <h2 style="margin-bottom: 20px;">Mode de Paiement</h2>
        
        <div class="payment-options">
            <button class="pay-btn bankily-style" onclick="showDetails('bankily')">Bankily</button>
            <button class="pay-btn wave-style" onclick="showDetails('wave')">Wave</button>
        </div>

        <div id="paymentDetails" style="display:none; margin-top: 20px;">
            <p id="paymentInstructions" style="font-weight: bold; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 2px dashed #00a0ff;"></p>
            
            <p style="background: #fff3cd; color: #856404; padding: 10px; border-radius: 5px; font-size: 0.9rem; margin: 15px 0; border: 1px solid #ffeeba;">
                📸 <strong>Note:</strong> Veuillez prendre une capture d'écran du reçu de paiement pour l'envoyer via WhatsApp.
            </p>

            <input type="text" id="deliveryAddress" placeholder="Votre adresse de livraison complète" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px;">
            
            <p style="color: #d9534f; font-weight: bold; margin-top: 10px;">Livraison : sous 7 jours</p>
            
            <button class="whatsapp-confirm-btn" onclick="confirmOrder()">Confirmer sur WhatsApp</button>
        </div>
    </div>
</div>

<footer style="background: #222; color: #fff; text-align: center; padding: 30px 10px; margin-top: 50px; font-family: sans-serif;">
    <p>Contact: Supports@ebnou-store.com</p>
    <p style="margin: 10px 0;">&copy; 2026 Ebnou Store. All Rights Reserved.</p>
    <p style="font-size: 0.8rem; color: #aaa;">Developed by: AHMED SALEM EBNOU</p>
</footer>

    <script type="module" src="js/script.js"></script>
</body>
</html>
